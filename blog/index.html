<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="refresh"
      content="0; url=https://wiki.nervtech.org/doku.php?id=blog"
    />
    <link rel="canonical" href="https://wiki.nervtech.org/doku.php?id=blog" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to NervForge...</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .redirect-message {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #0366d6;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      a {
        color: #0366d6;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
    <script>
      // Fallback JavaScript redirect in case meta refresh doesn't work
      window.location.replace("https://wiki.nervtech.org/doku.php?id=blog");
    </script>
  </head>
  <body>
    <div class="redirect-message">
      <h2>Redirecting to NervForge...</h2>
      <div class="spinner"></div>
      <p>
        If you are not redirected automatically,
        <a href="https://wiki.nervtech.org/doku.php?id=blog">click here</a>.
      </p>
    </div>
  </body>
</html>
