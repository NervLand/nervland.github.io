<html>
  <head>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(45deg, #f0f0f0, #606060);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
      }
      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      #progress {
        text-align: center;
        width: 80%;
        max-width: 500px;
      }
      #progress h1 {
        color: #333;
        margin-bottom: 20px;
      }
      #progress-bar {
        width: 100%;
        height: 30px;
        background-color: #e0e0e0;
        border: 5px solid white;
        border-radius: 15px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      #progress-bar-fill {
        width: 0%;
        height: 100%;
        background-color: #4fc3f7;
        transition: width 0.5s ease-in-out;
      }
      #progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      }
      #canvas-container {
        display: none;
        flex-grow: 1;
        position: relative;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #error-message {
        display: none;
        text-align: center;
        color: #ff0000;
        font-weight: bold;
        font-size: 1.2em;
        max-width: 80%;
      }
    </style>

    <script src="custom_loader.js"></script>
  </head>
  <body>
    <div id="progress">
      <h1 id="stage">Downloading NervForge...</h1>
      <div id="progress-bar">
        <div id="progress-bar-fill"></div>
        <div id="progress-text">0%</div>
      </div>
    </div>
    <div id="error-message"></div>
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <script type="module">
      import { BrotliDecode } from "./decode.min.js";

      function updateProgress(receivedBytes, contentLength) {
        const progVal = Math.round((receivedBytes / contentLength) * 100);
        const progressBar = document.getElementById("progress-bar-fill");
        const progressText = document.getElementById("progress-text");

        progressBar.style.width = `${progVal}%`;
        progressText.textContent = `${progVal}%`;
      }

      async function checkWebGPUSupport() {
        if (!navigator.gpu) {
          throw new Error("WebGPU not supported on this browser.");
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) {
          throw new Error("Couldn't request WebGPU adapter.");
        }

        return true;
      }

      function showError(message) {
        const progressElement = document.getElementById("progress");
        const errorElement = document.getElementById("error-message");

        progressElement.style.display = "none";
        errorElement.textContent = message;
        errorElement.style.display = "block";
      }

      async function initializeApplication() {
        try {
          await checkWebGPUSupport();

          fetchCompileCompressedWasm("NervForge", updateProgress).then(
            (wasmBinary) => {
              document.getElementById("progress").style.display = "none";
              document.getElementById("canvas-container").style.display =
                "block";

              window.Module =
                typeof window.Module != "undefined" ? window.Module : {};
              window.Module["wasmBinary"] = wasmBinary;
              var script = document.createElement("script");
              script.src = "NervForge.js";
              document.body.appendChild(script);
            },
          );
        } catch (error) {
          showError(`Error: ${error.message}`);
        }
      }

      window.BrotliDecode = BrotliDecode;
      initializeApplication();
    </script>
  </body>
</html>
